<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ username }} | GitHub Universe Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          background: {{ bg }};
          color: {{ text }};
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          overflow-x: hidden;
      }

      .bg-animation {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: -1;
          overflow: hidden;
      }

      .bg-animation::before {
          content: '';
          position: absolute;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle at 20% 50%, {{ primary }}10, transparent 50%),
                      radial-gradient(circle at 80% 80%, {{ secondary }}10, transparent 50%);
          animation: float 20s ease-in-out infinite;
      }

      @keyframes float {
          0%, 100% { transform: translate(0, 0) rotate(0deg); }
          33% { transform: translate(2%, 2%) rotate(1deg); }
          66% { transform: translate(-1%, 1%) rotate(-1deg); }
      }

      .container {
          max-width: 1400px;
          margin: 0 auto;
          padding: 40px 24px;
      }

      .header {
          text-align: center;
          margin-bottom: 60px;
      }

      .avatar {
          width: 100px;
          height: 100px;
          border-radius: 50%;
          background: linear-gradient(135deg, {{ primary }}, {{ secondary }});
          display: flex;
          align-items: center;
          justify-content: center;
          margin: 0 auto 20px;
          font-size: 48px;
          box-shadow: 0 0 40px {{ primary }}40;
          animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
          0%, 100% { transform: scale(1); box-shadow: 0 0 40px {{ primary }}40; }
          50% { transform: scale(1.05); box-shadow: 0 0 60px {{ primary }}60; }
      }

      .header h1 {
          font-size: 3rem;
          font-weight: 800;
          background: {{ primary_gradient }};
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          margin-bottom: 12px;
      }

      .header p {
          color: {{ text_secondary }};
          font-size: 1.1rem;
      }

      .stats-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 24px;
          margin-bottom: 48px;
      }

      .stat-card {
          background: {{ bg_card }};
          border-radius: 20px;
          padding: 24px;
          border: 1px solid {{ border }};
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          position: relative;
          overflow: hidden;
      }

      .stat-card::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 3px;
          background: {{ primary_gradient }};
          transform: scaleX(0);
          transition: transform 0.3s ease;
      }

      .stat-card:hover::before {
          transform: scaleX(1);
      }

      .stat-card:hover {
          transform: translateY(-8px);
          border-color: {{ primary }}40;
          box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      }

      .stat-icon {
          font-size: 2.5rem;
          margin-bottom: 16px;
      }

      .stat-label {
          color: {{ text_secondary }};
          font-size: 0.85rem;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 8px;
      }

      .stat-value {
          font-size: 2.2rem;
          font-weight: 800;
          background: {{ primary_gradient }};
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
      }

      .chart-section {
          background: {{ bg_card }};
          border-radius: 24px;
          padding: 32px;
          margin-bottom: 48px;
          border: 1px solid {{ border }};
      }

      .chart-section h2 {
          font-size: 1.5rem;
          font-weight: 700;
          margin-bottom: 24px;
          display: flex;
          align-items: center;
          gap: 12px;
      }

      .chart-container {
          position: relative;
          height: 400px;
      }

      .trophy-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 20px;
          margin-top: 24px;
      }

      .trophy-item {
          background: {{ bg }};
          border-radius: 16px;
          padding: 20px;
          text-align: center;
          border: 1px solid {{ border }};
          transition: all 0.3s ease;
          cursor: pointer;
      }

      .trophy-item:hover {
          transform: scale(1.05);
          border-color: currentColor;
      }

      .trophy-rank {
          font-size: 2rem;
          font-weight: 900;
          margin-bottom: 8px;
      }

      .trophy-name {
          font-size: 0.75rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 8px;
          color: {{ text_secondary }};
      }

      .trophy-title {
          font-size: 0.85rem;
          font-weight: 600;
          margin-bottom: 12px;
      }

      .trophy-count {
          font-size: 1.2rem;
          font-weight: 800;
      }

      .loading {
          text-align: center;
          padding: 60px;
      }

      .spinner {
          width: 50px;
          height: 50px;
          border: 3px solid {{ border }};
          border-top-color: {{ primary }};
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin: 0 auto 20px;
      }

      @keyframes spin {
          to { transform: rotate(360deg); }
      }

      .layout-toggle {
          display: flex;
          gap: 12px;
          margin-bottom: 20px;
      }

      .layout-btn {
          background: {{ bg }};
          border: 1px solid {{ border }};
          color: {{ text_secondary }};
          padding: 8px 16px;
          border-radius: 8px;
          cursor: pointer;
          font-size: 13px;
          font-weight: 600;
          transition: all 0.2s;
      }

      .layout-btn.active {
          background: {{ primary }};
          color: white;
          border-color: {{ primary }};
      }

      .layout-btn:hover {
          border-color: {{ primary }};
      }

      @media (max-width: 768px) {
          .container {
              padding: 20px 16px;
          }
          .header h1 {
              font-size: 2rem;
          }
          .stats-grid {
              grid-template-columns: 1fr;
          }
          .chart-container {
              height: 300px;
          }
      }

      ::-webkit-scrollbar {
          width: 8px;
          height: 8px;
      }
      ::-webkit-scrollbar-track {
          background: {{ bg }};
      }
      ::-webkit-scrollbar-thumb {
          background: {{ primary }};
          border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
          background: {{ secondary }};
      }
    </style>
  </head>
  <body>
    <div class="bg-animation"></div>
    <div class="container">
      <div class="header">
        <div class="avatar">👨‍💻</div>
        <h1>{{ username }}</h1>
        <p>GitHub Universe Dashboard • Real-time Analytics</p>
      </div>
      <div id="dashboard-content">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading cosmic data...</p>
        </div>
      </div>
    </div>

    <script>
      // Pass theme data from server
      const themeData = {
        text: "{{ text }}",
        text_secondary: "{{ text_secondary }}",
        bg_card: "{{ bg_card }}",
        border: "{{ border }}",
        primary: "{{ primary }}",
      };

      let currentLayout = "vertical";

      async function loadDashboard() {
        try {
          const response = await fetch(
            "/api/dashboard-data?username={{ username }}",
          );
          const data = await response.json();
          if (data.error) throw new Error(data.error);
          renderDashboard(data);
        } catch (err) {
          document.getElementById("dashboard-content").innerHTML =
            '<div class="loading"><p style="color: #ef4444;">⚠️ Error: ' +
            err.message +
            "</p></div>";
        }
      }

      function renderDashboard(data) {
        const stats = data.stats;
        const languages = data.languages;
        const trophies = data.trophies;

        const statsCards = [
          {
            icon: "⭐",
            label: "Total Stars",
            value: stats.total_stars.toLocaleString(),
          },
          {
            icon: "👥",
            label: "Followers",
            value: stats.followers.toLocaleString(),
          },
          {
            icon: "📦",
            label: "Repositories",
            value: stats.public_repos.toLocaleString(),
          },
          {
            icon: "💻",
            label: "Commits",
            value: stats.total_commits.toLocaleString(),
          },
          {
            icon: "🔄",
            label: "Pull Requests",
            value: stats.total_prs.toLocaleString(),
          },
          {
            icon: "🐛",
            label: "Issues",
            value: stats.total_issues.toLocaleString(),
          },
          {
            icon: "🔥",
            label: "Current Streak",
            value: stats.current_streak + " days",
          },
          {
            icon: "📅",
            label: "Longest Streak",
            value: stats.longest_streak + " days",
          },
        ];

        let statsHtml = '<div class="stats-grid">';
        statsCards.forEach((card) => {
          statsHtml +=
            '<div class="stat-card">' +
            '<div class="stat-icon">' +
            card.icon +
            "</div>" +
            '<div class="stat-label">' +
            card.label +
            "</div>" +
            '<div class="stat-value">' +
            card.value +
            "</div>" +
            "</div>";
        });
        statsHtml += "</div>";

        const langEntries = Object.entries(languages)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);
        const langColors = [
          "#FF6B6B",
          "#4ECDC4",
          "#45B7D1",
          "#96CEB4",
          "#FFEAA7",
          "#DDA0DD",
          "#98D8C8",
          "#F7D794",
          "#E77F67",
          "#786FA6",
        ];

        statsHtml += `
                <div class="chart-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px;">
                        <h2>📊 Language Distribution</h2>
                        <div class="layout-toggle">
                            <button class="layout-btn active" onclick="changeLayout('vertical')">📊 Vertical Bar</button>
                            <button class="layout-btn" onclick="changeLayout('pie')">🥧 Pie Chart</button>
                            <button class="layout-btn" onclick="changeLayout('horizontal')">📈 Horizontal Bar</button>
                        </div>
                    </div>
                    <div class="chart-container"><canvas id="langChart"></canvas></div>
                </div>
            `;

        let trophiesHtml =
          '<div class="chart-section"><h2>🏆 Achievement Trophies</h2><div class="trophy-grid">';
        trophies.forEach((trophy) => {
          let rankColor =
            trophy.rank === "S"
              ? "#FFD700"
              : trophy.rank === "AAA" || trophy.rank === "AA"
                ? "#C0C0C0"
                : "#CD7F32";
          trophiesHtml += `
                    <div class="trophy-item" style="border-color: ${rankColor}">
                        <div class="trophy-rank" style="color: ${rankColor}">${trophy.rank}</div>
                        <div class="trophy-name">${trophy.name}</div>
                        <div class="trophy-title" style="color: ${rankColor}">${trophy.title}</div>
                        <div class="trophy-count" style="color: ${rankColor}">${trophy.count}</div>
                    </div>
                `;
        });
        trophiesHtml += "</div></div>";

        document.getElementById("dashboard-content").innerHTML =
          statsHtml + trophiesHtml;

        window.langEntries = langEntries;
        window.langColors = langColors;
        createChart(currentLayout);
      }

      function createChart(layout) {
        const ctx = document.getElementById("langChart").getContext("2d");
        if (window.currentChart) window.currentChart.destroy();

        let chartConfig;

        if (layout === "vertical") {
          chartConfig = {
            type: "bar",
            data: {
              labels: window.langEntries.map((l) => l[0]),
              datasets: [
                {
                  label: "Usage %",
                  data: window.langEntries.map((l) => l[1]),
                  backgroundColor: window.langColors,
                  borderRadius: 8,
                  barPercentage: 0.7,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: themeData.bg_card,
                  titleColor: themeData.text,
                  bodyColor: themeData.text_secondary,
                  borderColor: themeData.primary,
                  borderWidth: 1,
                  callbacks: {
                    label: function (ctx) {
                      return "Usage: " + ctx.parsed.y + "%";
                    },
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  max: 100,
                  title: {
                    display: true,
                    text: "Percentage (%)",
                    color: themeData.text_secondary,
                  },
                  ticks: {
                    color: themeData.text_secondary,
                    callback: function (v) {
                      return v + "%";
                    },
                  },
                  grid: { color: themeData.border },
                },
                x: {
                  ticks: {
                    color: themeData.text,
                    maxRotation: 45,
                    minRotation: 45,
                  },
                  grid: { display: false },
                },
              },
              animation: { duration: 1000 },
            },
          };
        } else if (layout === "pie") {
          chartConfig = {
            type: "doughnut",
            data: {
              labels: window.langEntries.map((l) => l[0]),
              datasets: [
                {
                  data: window.langEntries.map((l) => l[1]),
                  backgroundColor: window.langColors,
                  borderWidth: 0,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "right",
                  labels: {
                    color: themeData.text,
                    font: { size: 11 },
                  },
                },
                tooltip: {
                  backgroundColor: themeData.bg_card,
                  titleColor: themeData.text,
                  bodyColor: themeData.text_secondary,
                  borderColor: themeData.primary,
                  borderWidth: 1,
                  callbacks: {
                    label: function (ctx) {
                      return ctx.label + ": " + ctx.parsed + "%";
                    },
                  },
                },
              },
              cutout: "60%",
              animation: { animateRotate: true, duration: 1000 },
            },
          };
        } else {
          chartConfig = {
            type: "bar",
            data: {
              labels: window.langEntries.map((l) => l[0]),
              datasets: [
                {
                  label: "Usage %",
                  data: window.langEntries.map((l) => l[1]),
                  backgroundColor: window.langColors,
                  borderRadius: 8,
                  indexAxis: "y",
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: themeData.bg_card,
                  titleColor: themeData.text,
                  bodyColor: themeData.text_secondary,
                  borderColor: themeData.primary,
                  borderWidth: 1,
                  callbacks: {
                    label: function (ctx) {
                      return "Usage: " + ctx.parsed.x + "%";
                    },
                  },
                },
              },
              scales: {
                x: {
                  beginAtZero: true,
                  max: 100,
                  title: {
                    display: true,
                    text: "Percentage (%)",
                    color: themeData.text_secondary,
                  },
                  ticks: {
                    color: themeData.text_secondary,
                    callback: function (v) {
                      return v + "%";
                    },
                  },
                  grid: { color: themeData.border },
                },
                y: {
                  ticks: {
                    color: themeData.text,
                    font: { size: 11 },
                  },
                  grid: { display: false },
                },
              },
              animation: { duration: 1000 },
            },
          };
        }

        window.currentChart = new Chart(ctx, chartConfig);
      }

      function changeLayout(layout) {
        currentLayout = layout;
        document.querySelectorAll(".layout-btn").forEach((btn) => {
          btn.classList.remove("active");
          if (
            btn.textContent.includes(
              layout === "vertical"
                ? "Vertical"
                : layout === "pie"
                  ? "Pie"
                  : "Horizontal",
            )
          ) {
            btn.classList.add("active");
          }
        });
        createChart(layout);
      }

      // Start loading
      loadDashboard();
    </script>
  </body>
</html>
